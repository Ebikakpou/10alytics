<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My DevOps Journey</title>
    
    <style>
        /* General Setup */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
        }

        /* Header Styling */
        header {
            background: #2c3e50;
            color: #ffffff;
            padding: 2rem;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
        }

        /* Main Content Area */
        main {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h2 {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 5px;
        }

        /* Skills List */
        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            background: #e1e8ed;
            margin: 5px 0;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
            color: #777;
        }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to My Portfolio</h1>
        <p>Future DevOps Engineer</p>
    </header>

    <main>
        <section class="about">
            <h2>About Me</h2>
            <p>I am learning how to automate the world using DevOps tools like Docker, WSL 2, and CI/CD pipelines!</p>
        </section>

        <section class="skills">
            <h2>My Skills</h2>
            <ul>
                <li>Agile Methodology</li>
                <li>Version Control (Git)</li>
                <li>Cloud Basics</li>
                <li>HTML/CSS</li>
            </ul>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 | Built with Automation</p>
    </footer>

</body>
</html>
