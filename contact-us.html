<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .contact-container {
            background: #fff;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-radius: 8px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            overflow: hidden;
        }

        /* Left Side: Info */
        .contact-info {
            background: #2c3e50;
            color: #fff;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .contact-info h2 {
            margin-bottom: 20px;
            font-size: 2rem;
        }

        .contact-info p {
            margin-bottom: 30px;
            line-height: 1.6;
            color: #bdc3c7;
        }

        .info-details {
            list-style: none;
        }

        .info-details li {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }

        .info-details strong {
            color: #fff;
            margin-right: 10px;
        }

        /* Right Side: Form */
        .contact-form {
            padding: 40px;
        }

        .contact-form h2 {
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-group input, 
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus, 
        .form-group textarea:focus {
            border-color: #2c3e50;
            outline: none;
        }

        .submit-btn {
            background: #2c3e50;
            color: #fff;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }

        .submit-btn:hover {
            background: #34495e;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .contact-container {
                grid-template-columns: 1fr;
            }
            .contact-info {
                padding: 30px;
            }
            .contact-form {
                padding: 30px;
            }
        }
    </style>
</head>
<body>

    <div class="contact-container">
        <!-- Contact Information Section -->
        <div class="contact-info">
            <h2>Get in Touch</h2>
            <p>Have a question or just want to say hi? Drop us a message, and we'll get back to you as soon as possible.</p>
            
            <ul class="info-details">
                <li><strong>Email:</strong> hello@yourdomain.com</li>
                <li><strong>Phone:</strong> +1 (555) 019-2834</li>
                <li><strong>Address:</strong> 123 Innovation Way, Tech City</li>
            </ul>
        </div>

        <!-- Contact Form Section -->
        <div class="contact-form">
            <h2>Send a Message</h2>
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="john@example.com" required>
                </div>
                
                <div class="form-group">ss
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="How can we help you?" required></textarea>
                </div>
                
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>
    </div>

</body>
</html>
